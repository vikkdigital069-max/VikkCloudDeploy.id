<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VikkCloudDeploy.id - Professional Cloud Deployment</title>
    <style>
        /* CSS Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #00e5ff;
            --primary-hover: #00b3cc;
            --bg-overlay: rgba(10, 10, 12, 0.75);
            --card-bg: rgba(20, 20, 25, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --info: #3b82f6;
        }

        body, html {
            height: 100%;
            color: var(--text-main);
            overflow-x: hidden;
            background-color: #0a0a0c;
        }

        /* Ambient Background Video */
        .bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100;
            object-fit: cover;
            filter: blur(4px);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            z-index: -99;
        }

        /* Container & Layout */
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        /* Navbar / Header */
        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 12px;
            border: 1.5px solid rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }

        .brand-container {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-tagline {
            font-size: 0.85rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-top: 2px;
        }

        /* Banner Video Dashboard */
        .banner-container {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 35px;
            border: 1px solid var(--card-border);
            aspect-ratio: 16 / 7;
        }

        .banner-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Main Form (Glassmorphism) */
        .deploy-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group:last-of-type {
            margin-bottom: 35px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(10, 10, 12, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
            background: rgba(10, 10, 12, 0.8);
        }

        /* Drag & Drop File Zone */
        .file-zone {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 35px 20px;
            text-align: center;
            background: rgba(10, 10, 12, 0.3);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .file-zone:hover {
            border-color: var(--primary);
            background: rgba(0, 229, 255, 0.02);
        }

        .file-zone input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* SVG Icons (No Emojis) */
        .upload-icon {
            width: 32px;
            height: 32px;
            stroke: var(--text-muted);
            margin-bottom: 12px;
            transition: stroke 0.25s ease;
        }
        
        .file-zone:hover .upload-icon {
            stroke: var(--primary);
        }

        .file-info {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .file-info strong {
            color: var(--text-main);
        }

        /* Action Button */
        .btn-deploy {
            width: 100%;
            padding: 16px;
            background: var(--text-main);
            color: #0a0a0c;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-deploy:hover {
            background: var(--primary);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
        }

        .btn-deploy:disabled {
            background: #475569;
            color: #1e293b;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Professional Toast Notification System */
        #toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            min-width: 320px;
            max-width: 420px;
            padding: 16px 20px;
            border-radius: 8px;
            background: #1e1e24;
            border-left: 4px solid var(--info);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 4px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toast-message {
            font-size: 0.9rem;
            color: #cbd5e1;
            word-break: break-word;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.success .toast-title { color: var(--success); }
        .toast.error { border-left-color: var(--error); }
        .toast.error .toast-title { color: var(--error); }
        .toast.info { border-left-color: var(--info); }
        .toast.info .toast-title { color: var(--info); }
    </style>
</head>
<body>

    <video class="bg-video" autoplay loop muted playsinline>
        <source src="beground.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div id="toast-container"></div>

    <div class="container">
        
        <header>
            <img src="websed icon.jpg" alt="VikkCloudDeploy Developer Icon" class="logo-icon">
            <div class="brand-container">
                <span class="brand-name">VikkCloudDeploy.id</span>
                <span class="brand-tagline">Enterprise Deployment Platform</span>
            </div>
        </header>

        <div class="banner-container">
            <video class="banner-video" autoplay loop muted playsinline>
                <source src="banner.mp4" type="video/mp4">
            </video>
        </div>

        <div class="deploy-card">
            <form id="uploadForm">

                <div class="form-group">
                    <label for="webName">Website Nama</label>
                    <input type="text" id="webName" placeholder="contoh: production-service-app" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label>File Target (HTML)</label>
                    <div class="file-zone">
                        <input type="file" id="htmlFile" accept=".html" required>
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <div class="file-info" id="fileInfoText">
                            Seret file atau <strong>Telusuri Dokumen</strong> (.html)
                        </div>
                    </div>
                </div>

                <button type="submit" id="deployBtn" class="btn-deploy">Deploy Ke Jaringan</button>
                
            </form>
        </div>

    </div>

    <script>
        // System Notification Toast Generator (Professional, No Emoji)
        function showNotification(title, message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            toast.innerHTML = `
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            `;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // UI File Upload Listener
        const fileInput = document.getElementById('htmlFile');
        const fileInfoText = document.getElementById('fileInfoText');

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                fileInfoText.innerHTML = `Berkas terunggah: <strong>${this.files[0].name}</strong>`;
                showNotification('BERKAS DIUNGGAH', `File ${this.files[0].name} siap diproses.`, 'info');
            } else {
                fileInfoText.innerHTML = `Seret file atau <strong>Telusuri Dokumen</strong> (.html)`;
            }
        });

        // Vercel Deployment Frontend Handler
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const projectName = document.getElementById('webName').value.trim().toLowerCase().replace(/\s+/g, '-');
            const file = fileInput.files[0];
            const deployBtn = document.getElementById('deployBtn');

            if (!file) {
                showNotification('KESALAHAN SISTEM', 'Gagal memproses, dokumen HTML tidak ditemukan.', 'error');
                return;
            }

            deployBtn.disabled = true;
            deployBtn.innerText = "Memproses Deployment...";
            showNotification('PROSES DEPLOYMENT', `Membaca data file ${file.name}...`, 'info');

            try {
                const fileReader = new FileReader();
                
                const fileContent = await new Promise((resolve, reject) => {
                    fileReader.onload = (e) => resolve(e.target.result);
                    fileReader.onerror = (e) => reject(e);
                    fileReader.readAsText(file);
                });

                showNotification('KONEKSI SERVER', 'Mengirim data ke server backend tersembunyi...', 'info');

                // MENEMBAK JALUR BELAKANG AMAN (Cara 2)
                const response = await fetch('/api/deploy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        projectName: projectName,
                        fileContent: fileContent
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showNotification('DEPLOYMENT SUKSES', `Situs web berhasil online!`, 'success');
                    setTimeout(() => {
                        window.open(`https://${result.url}`, '_blank');
                    }, 1500);
                } else {
                    showNotification('DEPLOYMENT GAGAL', result.error || 'Terjadi kesalahan sistem.', 'error');
                }

            } catch (error) {
                showNotification('KESALAHAN JARINGAN', 'Gagal memproses request ke backend.', 'error');
                console.error(error);
            } finally {
                deployBtn.disabled = false;
                deployBtn.innerText = "Deploy Ke Jaringan";
            }
        });
    </script>

</body>
</html>
